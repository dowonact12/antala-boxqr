{% extends "base.html" %}
{% block content %}
<form action="/submit" method="POST" enctype="multipart/form-data" class="space-y-6">
    <div class="bg-white p-6 rounded-lg shadow-sm border space-y-4">
        <h2 class="text-lg font-semibold border-b pb-2">박스 정보 / Box Info</h2>

        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">박스 번호 / Box Number *</label>
                <div class="flex gap-2">
                    <input type="text" name="box_number" id="box_number" required
                           class="flex-1 border rounded px-3 py-2 focus:ring-2 focus:ring-blue-300 outline-none"
                           placeholder="2026-0506-001">
                    <button type="button" onclick="generateBoxNumber()"
                            class="px-3 py-2 bg-gray-200 rounded hover:bg-gray-300 text-sm whitespace-nowrap">자동생성</button>
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">발송일 / Ship Date *</label>
                <input type="date" name="ship_date" id="ship_date" required
                       class="w-full border rounded px-3 py-2 focus:ring-2 focus:ring-blue-300 outline-none">
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">바이어명 / Buyer *</label>
                <input type="text" name="buyer" required list="buyer-list"
                       class="w-full border rounded px-3 py-2 focus:ring-2 focus:ring-blue-300 outline-none">
                <datalist id="buyer-list">
                    <option value="Oyuka">
                    <option value="INES">
                    <option value="MUVO">
                    <option value="YUJIATE">
                    <option value="KYRGYZ">
                </datalist>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">인보이스 번호 / Invoice # *</label>
                <input type="text" name="invoice_number" required
                       class="w-full border rounded px-3 py-2 focus:ring-2 focus:ring-blue-300 outline-none"
                       placeholder="INV-2026-0042">
            </div>
        </div>
    </div>

    <div class="bg-white p-6 rounded-lg shadow-sm border space-y-4">
        <div class="flex items-center justify-between border-b pb-2">
            <h2 class="text-lg font-semibold">품목 리스트 / Items</h2>
            <button type="button" onclick="addItemRow()"
                    class="px-3 py-1 bg-blue-500 text-white rounded hover:bg-blue-600 text-sm">+ 행 추가</button>
        </div>

        <div id="items-container">
            <div class="grid grid-cols-12 gap-2 text-sm font-medium text-gray-600 mb-2">
                <div class="col-span-8">제품명 / Product</div>
                <div class="col-span-2">수량 / Qty</div>
                <div class="col-span-2"></div>
            </div>
            <div class="item-row grid grid-cols-12 gap-2 mb-2">
                <input type="text" name="item_name[]" placeholder="제품명"
                       class="col-span-8 border rounded px-2 py-1.5 text-sm focus:ring-2 focus:ring-blue-300 outline-none">
                <input type="number" name="item_qty[]" placeholder="50" min="1"
                       class="col-span-2 border rounded px-2 py-1.5 text-sm focus:ring-2 focus:ring-blue-300 outline-none">
                <button type="button" onclick="removeItemRow(this)"
                        class="col-span-2 text-red-500 hover:text-red-700 text-sm">삭제</button>
            </div>
        </div>
    </div>

    <div class="bg-white p-6 rounded-lg shadow-sm border space-y-4">
        <h2 class="text-lg font-semibold border-b pb-2">추가 정보 / Additional (선택)</h2>
        <div class="grid grid-cols-3 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">포장자 / Packed by</label>
                <input type="text" name="packed_by" value="Dowon"
                       class="w-full border rounded px-3 py-2 focus:ring-2 focus:ring-blue-300 outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">총 무게 / Weight (kg)</label>
                <input type="number" name="total_weight" step="0.1"
                       class="w-full border rounded px-3 py-2 focus:ring-2 focus:ring-blue-300 outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">박스 치수 / Dimensions</label>
                <input type="text" name="dimensions" placeholder="40x30x25"
                       class="w-full border rounded px-3 py-2 focus:ring-2 focus:ring-blue-300 outline-none">
            </div>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">비고 / Note</label>
            <input type="text" name="note"
                   class="w-full border rounded px-3 py-2 focus:ring-2 focus:ring-blue-300 outline-none">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">패킹 사진 / Packing Photo (선택)</label>
            <input type="file" name="photo" accept="image/*"
                   class="w-full border rounded px-3 py-2 text-sm file:mr-3 file:px-3 file:py-1 file:rounded file:border-0 file:bg-blue-50 file:text-blue-700 file:cursor-pointer">
            <p class="text-xs text-gray-500 mt-1">박스 내용물 사진을 첨부하면 PDF 2페이지에 인쇄됩니다</p>
        </div>
    </div>

    <div class="flex justify-end">
        <button type="submit"
                class="px-8 py-3 bg-blue-600 text-white font-semibold rounded-lg hover:bg-blue-700 shadow">
            QR 생성 / Generate
        </button>
    </div>
</form>

<script>
function generateBoxNumber() {
    fetch('/api/box-number')
        .then(r => r.json())
        .then(d => document.getElementById('box_number').value = d.box_number);
}

function addItemRow() {
    const container = document.getElementById('items-container');
    const row = document.createElement('div');
    row.className = 'item-row grid grid-cols-12 gap-2 mb-2';
    row.innerHTML = `
        <input type="text" name="item_name[]" placeholder="제품명"
               class="col-span-8 border rounded px-2 py-1.5 text-sm focus:ring-2 focus:ring-blue-300 outline-none">
        <input type="number" name="item_qty[]" placeholder="50" min="1"
               class="col-span-2 border rounded px-2 py-1.5 text-sm focus:ring-2 focus:ring-blue-300 outline-none">
        <button type="button" onclick="removeItemRow(this)"
                class="col-span-2 text-red-500 hover:text-red-700 text-sm">삭제</button>
    `;
    container.appendChild(row);
    row.querySelector('input').focus();
}

function removeItemRow(btn) {
    const rows = document.querySelectorAll('.item-row');
    if (rows.length > 1) {
        btn.closest('.item-row').remove();
    }
}

function compressImage(file, maxSize, quality) {
    return new Promise((resolve) => {
        if (!file || !file.type.startsWith('image/')) { resolve(null); return; }
        const img = new Image();
        img.onload = () => {
            let w = img.width, h = img.height;
            if (Math.max(w, h) > maxSize) {
                const ratio = maxSize / Math.max(w, h);
                w = Math.round(w * ratio);
                h = Math.round(h * ratio);
            }
            const canvas = document.createElement('canvas');
            canvas.width = w; canvas.height = h;
            canvas.getContext('2d').drawImage(img, 0, 0, w, h);
            canvas.toBlob(resolve, 'image/jpeg', quality);
        };
        img.src = URL.createObjectURL(file);
    });
}

document.addEventListener('DOMContentLoaded', () => {
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('ship_date').value = today;
    generateBoxNumber();

    document.querySelector('form').addEventListener('submit', async (e) => {
        const photoInput = document.querySelector('input[name="photo"]');
        const file = photoInput.files[0];
        if (!file || !file.type.startsWith('image/')) return;
        e.preventDefault();
        const btn = document.querySelector('button[type="submit"]');
        btn.disabled = true; btn.textContent = '사진 압축 중...';
        const blob = await compressImage(file, 800, 0.6);
        if (blob) {
            const compressed = new File([blob], file.name.replace(/\.\w+$/, '.jpg'), {type: 'image/jpeg'});
            const dt = new DataTransfer();
            dt.items.add(compressed);
            photoInput.files = dt.files;
        }
        btn.textContent = 'QR 생성 / Generate'; btn.disabled = false;
        e.target.submit();
    });
});
</script>
{% endblock %}
